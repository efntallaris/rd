[redis_masters]
redis0 ansible_connection=local
redis1
redis2

[redis_migrate]
redis3

# Chain followers: redis4 and ycsb1 join redis3's vanilla cluster as REPLICA
# nodes (CLUSTER REPLICATE <redis3-id>). Each runs cluster-enabled redis-server
# with rdma-chain-followers configured. redis3 is the migration recipient
# leader; chain code forwards migrated bytes from redis3 to these two so they
# get the post-FLIP keys (which kvstoreDictAddRaw bypasses standard replication).
[redis_migrate_replicas]
redis4
ycsb1

[redis_spare]

[redis_nodes:children]
redis_masters
redis_migrate
redis_migrate_replicas
redis_spare

[ycsb_nodes]
ycsb0

[all:children]
redis_nodes
ycsb_nodes
