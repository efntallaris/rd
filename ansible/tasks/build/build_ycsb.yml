---
- name: "Build YCSB"
  hosts: ycsb_nodes
  become: yes
  tasks:
    - name: Ensure YCSB checkout parent dir exists
      file:
        path: "{{ ycsb_checkout_dir }}"
        state: directory
        mode: "0755"

    # Use the controller-local checkout as the source of truth instead of
    # re-cloning from GitHub on every run. Lets us iterate on RedisClient.java
    # locally without committing+pushing each change. To revert to upstream-only
    # behavior, re-enable the `git:` block and remove the rsync below.
    - name: Ensure ycsb_src_dir parent exists on YCSB host
      file:
        path: "{{ ycsb_src_dir }}"
        state: directory
        mode: "0755"

    - name: Mirror local ycsb_client from controller to YCSB host
      delegate_to: localhost
      shell: |
        rsync -a --delete --exclude='.git' --exclude='target' \
          /users/entall/rd/ycsb_client/ root@{{ inventory_hostname }}:{{ ycsb_src_dir }}/
      changed_when: false

    - name: Purge potentially corrupted restlet artifacts from m2 cache
      file:
        path: "{{ ansible_env.HOME }}/.m2/repository/org/restlet"
        state: absent

    - name: Build YCSB with Maven
      command: mvn clean install -T 8 -Dmaven.test.skip=true -Dcheckstyle.skip
      args:
        chdir: "{{ ycsb_src_dir }}"

    - name: Find YCSB tarball
      find:
        paths: "{{ ycsb_src_dir }}/distribution/target"
        patterns: "ycsb-*.tar.gz"
      register: ycsb_tarball

    - name: Create temp directory
      file:
        path: /tmp/ycsb_temp
        state: directory

    - name: Extract YCSB tarball
      unarchive:
        src: "{{ ycsb_tarball.files[0].path }}"
        dest: /tmp/ycsb_temp
        remote_src: yes

    - name: Remove old YCSB directory
      file:
        path: "{{ ycsb_dir }}"
        state: absent

    - name: Create YCSB directory
      file:
        path: "{{ ycsb_dir }}"
        state: directory

    - name: Find extracted YCSB directory
      find:
        paths: /tmp/ycsb_temp
        file_type: directory
        recurse: no
      register: ycsb_extracted

    - name: Copy YCSB to final location
      shell: cp -rf {{ ycsb_extracted.files[0].path }}/* {{ ycsb_dir }}/

    - name: Clean up temp directory
      file:
        path: /tmp/ycsb_temp
        state: absent

    - name: Ensure workloads directory exists on YCSB node
      file:
        path: "{{ redis_workload_path }}"
        state: directory
        mode: "0755"

    - name: Copy YCSB workload files to YCSB node
      copy:
        src: "{{ item }}"
        dest: "{{ redis_workload_path }}"
        mode: "0644"
      with_fileglob:
        - "/rd/workloads/*"
