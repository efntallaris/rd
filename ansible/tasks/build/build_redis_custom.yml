---
# Build on every host that runs redis-server: the 3 redisraft donor masters
# (redis_masters), the migration recipient master (redis_migrate), and the
# migration recipient chain replicas (redis_migrate_replicas = redis4 + ycsb1).
- name: "Build and install Redis (with deps)"
  hosts: redis_masters:redis_migrate:redis_migrate_replicas
  become: yes
  tasks:
    - name: Force-clean rdma_migration sub-library (avoid stale .a after git checkout — git resets mtimes so make would otherwise see "nothing to do")
      shell: make clean
      args:
        chdir: "{{ redis_dir }}/src/rdma_migration"

    - name: Generate jemalloc configure script if missing
      shell: ./autogen.sh
      args:
        chdir: "{{ redis_dir }}/deps/jemalloc"
        creates: "{{ redis_dir }}/deps/jemalloc/configure"

    - name: Build Redis dependencies (hiredis, linenoise, lua, jemalloc, fast_float)
      make:
        chdir: "{{ redis_dir }}/deps"
        target: "{{ item }}"
      loop:
        - hiredis
        - linenoise
        - lua
        - jemalloc
        - fast_float

    - name: Install Redis binaries
      make:
        chdir: "{{ redis_dir }}"
        target: install
        params:
          PREFIX: "{{ local_setup_dir }}"
