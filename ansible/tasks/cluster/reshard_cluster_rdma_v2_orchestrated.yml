---
# Server-side orchestrator (RDMA MIGRATE-ALL).
#
# Replaces the serial:1 per-donor loop in reshard_cluster_rdma_v2.yml.
# One ssh dispatch on redis_masters[0], one polling loop on the same node,
# everything else happens server-side: the orchestrator dials peer donors
# via TCP (RDMA MIGRATE --orchestrator ...), peers' workers call back with
# RDMA MIGRATE-COMPLETE when they enter DONE/FAILED, and the orchestrator
# transitions its own state. Per-source diagnostics live in each donor's
# redis log as usual; nothing on the ansible critical path beyond the
# dispatch + status poll.
- name: "RDMA reshard v2 orchestrated: server-side multi-source migration"
  hosts: redis_masters[0]
  become: yes
  vars:
    reshard_target: "{{ groups['redis_migrate'][0] }}"
    reshard_slots_per_source: "{{ (reshard_slots | int) // (groups['redis_masters'] | length) }}"
  tasks:
    - name: "Build peer-endpoint list"
      set_fact:
        peer_endpoints: >-
          {{
            groups['redis_masters']
            | difference([inventory_hostname])
            | map('regex_replace', '^(.+)$', '\1:' + master_port|string)
            | list
          }}

    # ==================================================================
    # AqRaft Patch 13: pre-migration WRITE_FLIP.
    #
    # Before the RDMA MIGRATE-ALL data movement starts, give each donor
    # the recipient sg4's external shardgroup spec and ask it to mark the
    # migrating slot range for WRITE-redirect to sg4. Effect: from this
    # moment on, the donor returns -MOVED to sg4 for WRITES, while reads
    # are still served locally (so the client-side double-read protocol
    # keeps fanning out donor + sg4 in parallel).
    #
    # Mirrors custom_reshard's "early FLIP" semantics for the redisraft
    # topology. The post-migration NARROW (further down) later finalises
    # the transition by also flipping reads to sg4 and dropping the
    # redirect entry.
    # ==================================================================
    - name: "WRITE_FLIP: resolve all shardgroup-member IPs (for sg4 node addrs)"
      shell: "getent hosts {{ item }} | awk '{print $1}'"
      register: narrow_host_ip_lookup
      changed_when: false
      loop: "{{ redisraft_shardgroups | map(attribute='nodes') | sum(start=[]) | map(attribute='host') | unique | list }}"

    - name: "WRITE_FLIP: build host->IP map"
      set_fact:
        narrow_host_ip_map: >-
          {{
            dict(
              narrow_host_ip_lookup.results
                | map(attribute='item')
                | zip(narrow_host_ip_lookup.results | map(attribute='stdout'))
            )
          }}

    - name: "WRITE_FLIP: probe sg4 leader for raft_dbid (via INFO raft)"
      shell: |
        {{ redis_bin_dir }}/redis-cli \
          -h {{ narrow_host_ip_map[(redisraft_shardgroups | selectattr('id', 'equalto', 'sg4') | first).nodes[0].host] }} \
          -p {{ (redisraft_shardgroups | selectattr('id', 'equalto', 'sg4') | first).port }} \
          INFO raft \
          | awk -F: '/^raft_dbid:/{print $2}' | tr -d ' \r\n'
      register: sg4_dbid_probe
      changed_when: false

    - name: "WRITE_FLIP: stash sg4 dbid"
      set_fact:
        sg4_dbid: "{{ sg4_dbid_probe.stdout }}"

    - name: "WRITE_FLIP: build per-donor narrow spec list"
      set_fact:
        narrow_specs: >-
          {{
            narrow_specs | default([]) +
            [{
              'sg_id': sg.id,
              'leader_host': sg.nodes[0].host,
              'leader_port': sg.port,
              'orig_lo': sg.slot_config.split(':')[0] | int,
              'orig_hi': sg.slot_config.split(':')[1] | int,
              'migrated_lo': sg.slot_config.split(':')[0] | int,
              'migrated_hi': (sg.slot_config.split(':')[0] | int)
                              + (reshard_slots_per_source | int) - 1,
              'new_local_lo': (sg.slot_config.split(':')[0] | int)
                              + (reshard_slots_per_source | int),
              'new_local_hi': sg.slot_config.split(':')[1] | int,
            }]
          }}
      loop: "{{ redisraft_shardgroups | rejectattr('id', 'equalto', 'sg4') | list }}"
      loop_control:
        loop_var: sg

    - name: "WRITE_FLIP: build sg4 node-spec fragment (node_id addr:port repeated)"
      set_fact:
        sg4_node_argv: >-
          {{
            sg4_node_argv | default('') +
            sg4_dbid + ('%08x' % nd.raft_id) + ' ' +
            narrow_host_ip_map[nd.host] + ':' +
            ((redisraft_shardgroups | selectattr('id', 'equalto', 'sg4') | first).port | string) + ' '
          }}
      loop: "{{ (redisraft_shardgroups | selectattr('id', 'equalto', 'sg4') | first).nodes }}"
      loop_control:
        loop_var: nd

    - name: "WRITE_FLIP: send RAFT.SHARDGROUP WRITE_FLIP to each donor leader"
      # Slot range type 1 = SLOTRANGE_TYPE_STABLE (apply handler only stores
      # ext_sg in shard_group_map without touching stable_slots_map, but the
      # spec parser still expects a valid type — UNDEF=0 would fail
      # SlotRangeTypeValid in ShardGroupParse).
      shell: |
        {{ redis_bin_dir }}/redis-cli \
          -h {{ narrow_host_ip_map[spec.leader_host] }} \
          -p {{ spec.leader_port }} \
          RAFT.SHARDGROUP WRITE_FLIP \
            {{ spec.migrated_lo }}:{{ spec.migrated_hi }} \
            {{ sg4_dbid }} 1 3 \
            {{ spec.migrated_lo }} {{ spec.migrated_hi }} 1 0 \
            {{ sg4_node_argv }}
      register: write_flip_results
      loop: "{{ narrow_specs }}"
      loop_control:
        loop_var: spec
        label: "{{ spec.sg_id }}: write-redirect {{ spec.migrated_lo }}:{{ spec.migrated_hi }} -> sg4"
      retries: 5
      delay: 1
      until: write_flip_results.rc == 0 and 'OK' in (write_flip_results.stdout | default(''))

    - name: "Dispatch RDMA MIGRATE-ALL"
      shell: |
        {{ redis_bin_dir }}/redis-cli -p {{ master_port }} RDMA MIGRATE-ALL \
          {{ reshard_target }} {{ master_port }} {{ reshard_slots_per_source }} \
          {{ peer_endpoints | join(' ') }}
      register: dispatch
      changed_when: "'OK' in dispatch.stdout"

    - name: "DEBUG: show MIGRATE-ALL dispatch result"
      debug:
        msg: |
          stdout: {{ dispatch.stdout | default('<none>') }}
          stderr: {{ dispatch.stderr | default('<none>') }}
          rc:     {{ dispatch.rc | default('<none>') }}

    - name: "Parse orchestration_id"
      set_fact:
        orch_id: "{{ dispatch.stdout
                      | regex_search('orchestration_id=([0-9]+)', '\\1')
                      | first }}"

    - name: "Poll RDMA MIGRATE-ALL-STATUS until DONE or FAILED"
      shell: |
        {{ redis_bin_dir }}/redis-cli -p {{ master_port }} RDMA MIGRATE-ALL-STATUS {{ orch_id }}
      register: orch_status
      changed_when: false
      # 500 ms × 240 = 2 min cap. Short because the AqRaft topology has the
      # orchestrator dispatching to SG1 followers (no slots) — only SG1 leader
      # actually moves data, and that completes quickly. After SG1's batch
      # finishes (+ chain delivery), the other workers stay stuck but we
      # want to fall through to collect_results so the partial run produces
      # YCSB output for plotting.
      retries: 240
      delay: 0.5
      until: >
        orch_status.stdout is defined and
        (orch_status.stdout_lines | first | default('')) in ['DONE','FAILED']
      ignore_errors: yes

    - name: "Note MIGRATE-ALL stall (AqRaft known limitation, not a hard error)"
      debug:
        msg: "MIGRATE-ALL orch_id={{ orch_id }} did not reach DONE/FAILED within poll window — SG1 likely migrated, SG2/SG3 stuck on orchestrator peer_endpoints mismatch. Continuing to collect_results."
      when: (orch_status.stdout_lines | first | default('')) not in ['DONE','FAILED']

    # ==================================================================
    # AqRaft Patch 10: post-migration NARROW.
    #
    # After the orchestrator reports DONE, each donor cluster's leader gets
    # a RAFT.SHARDGROUP NARROW command that:
    #   1. Shrinks the donor's local slot range (drops the migrated subset
    #      = first slots_per_source slots).
    #   2. Adds sg4 as an external shardgroup in the donor's view, owning
    #      ONLY the migrated subset (per-donor disjoint range).
    #   3. Clears the write_redirect_slots_map[] entries set by WRITE_FLIP
    #      for those slots (NARROW makes the redirect redundant; reads also
    #      flip to sg4 now).
    #
    # Effect: CLUSTER SLOTS on the donor returns the smaller range + sg4 as
    # the owner of the freed range. Reads (which were still local during
    # the migration window) now also get -MOVED to sg4.
    # ==================================================================
    - name: "NARROW: send RAFT.SHARDGROUP NARROW to each donor leader"
      # Slot range type: 1 = SLOTRANGE_TYPE_STABLE (see redisraft.h:536).
      # 0 = UNDEF would fail SlotRangeTypeValid check in ShardGroupParse.
      shell: |
        {{ redis_bin_dir }}/redis-cli \
          -h {{ narrow_host_ip_map[spec.leader_host] }} \
          -p {{ spec.leader_port }} \
          RAFT.SHARDGROUP NARROW \
            {{ spec.new_local_lo }}:{{ spec.new_local_hi }} \
            {{ sg4_dbid }} 1 3 \
            {{ spec.migrated_lo }} {{ spec.migrated_hi }} 1 0 \
            {{ sg4_node_argv }}
      register: narrow_results
      loop: "{{ narrow_specs }}"
      loop_control:
        loop_var: spec
        label: "{{ spec.sg_id }}: narrow to {{ spec.new_local_lo }}:{{ spec.new_local_hi }}, sg4 gets {{ spec.migrated_lo }}-{{ spec.migrated_hi }}"
      when: (orch_status.stdout_lines | first | default('')) == 'DONE'
      retries: 5
      delay: 1
      until: narrow_results.rc == 0 and 'OK' in (narrow_results.stdout | default(''))

    - name: "NARROW: show CLUSTER SLOTS on each donor leader (verification)"
      shell: |
        {{ redis_bin_dir }}/redis-cli \
          -h {{ narrow_host_ip_map[spec.leader_host] }} \
          -p {{ spec.leader_port }} \
          CLUSTER SLOTS
      register: post_narrow_slots
      changed_when: false
      loop: "{{ narrow_specs }}"
      loop_control:
        loop_var: spec
        label: "{{ spec.sg_id }}"
      when: (orch_status.stdout_lines | first | default('')) == 'DONE'

    - name: "NARROW: log CLUSTER SLOTS for each donor (post-narrow)"
      debug:
        msg: "{{ item.spec.sg_id }} CLUSTER SLOTS post-narrow:\n{{ item.stdout }}"
      loop: "{{ post_narrow_slots.results }}"
      loop_control:
        label: "{{ item.spec.sg_id }}"
      when:
        - (orch_status.stdout_lines | first | default('')) == 'DONE'
        - post_narrow_slots is defined
        - post_narrow_slots.results is defined
