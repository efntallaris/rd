---
# RDMA-based reshard step. Used by experiments/custom_reshard/.
#
# Phase 1 of the new mechanism: each source master calls
#   CONFIG SET rdma-migration-port <unique-per-source>   (avoid recipient port collision)
#   RDMA MIGRATE-PREP <recipient> <port> <any-slot>      (bootstrap RDMA QP)
#   RDMA RESHARD     <recipient> <port> <n-slots>        (register sender MRs)
#
# By giving each source a unique port on the recipient, the recipient's
# rdmamig_server can be created independently per donor (one rdma_server
# per port), so all sources connect successfully. Without this, the
# second/third donors' INIT-SERVER would fail with `rdmamig_server_create
# failed` because the single shared port (17777) is already bound.
#
# Phase 1 does NOT move slot data yet — that's Phase 2 — so YCSB-during-
# reshard won't see slot ownership changes here. The orchestration slot
# is preserved so we can swap in Phases 2/3 without touching workload.yml.
- name: "RDMA reshard: register source MRs on each master"
  hosts: redis_masters
  become: yes
  vars:
    reshard_target: "{{ groups['redis_migrate'][0] }}"
    reshard_slots_per_source: "{{ (reshard_slots | int) // (groups['redis_masters'] | length) }}"
    rdma_port_base: 17777
  tasks:
    - name: Compute this source's unique RDMA port
      set_fact:
        src_rdma_port: "{{ (rdma_port_base | int) + (groups['redis_masters'].index(inventory_hostname) | int) }}"

    - name: Log RDMA reshard start
      debug:
        msg: "[{{ inventory_hostname }}] RDMA RESHARD -> {{ reshard_target }}:{{ master_port }} for {{ reshard_slots_per_source }} slots (own RDMA port {{ src_rdma_port }})"

    - name: "CONFIG SET rdma-migration-port to per-source value"
      shell: |
        {{ redis_bin_dir }}/redis-cli -p {{ master_port }} \
          CONFIG SET rdma-migration-port {{ src_rdma_port }}
      register: cfg_set
      changed_when: false

    # MIGRATE-PREP's 3rd arg is slot COUNT (not slot id). Phase 2 RESHARD-TRANSFER
    # needs the recipient's landing buffer for each slot the source registered,
    # so this count must match `reshard_slots_per_source`. Earlier Phase 1
    # versions passed 0 — Phase 1 only needed the QP up, not the recipient
    # buffers — but Phase 2 reads L->buffers[slot].ptr to RDMA-WRITE into.
    # rdmaMigratePrepCommand takes a LIST of slot ids (not a count).
    # Each source enumerates its own lowest reshard_slots_per_source slots
    # from CLUSTER NODES and passes them explicitly.
    - name: "Get this source's owned slot range"
      shell: |
        {{ redis_bin_dir }}/redis-cli -p {{ master_port }} CLUSTER NODES \
          | awk '$3 ~ /myself/ {print $9}'
      register: my_slot_range
      changed_when: false

    - name: "Bootstrap RDMA link + register {{ reshard_slots_per_source }} recipient buffers"
      shell: |
        START=$(echo '{{ my_slot_range.stdout }}' | cut -d- -f1)
        END=$((START + {{ reshard_slots_per_source }} - 1))
        SLOTS=$(seq $START $END | tr '\n' ' ')
        {{ redis_bin_dir }}/redis-cli -p {{ master_port }} \
          RDMA MIGRATE-PREP {{ reshard_target }} {{ master_port }} $SLOTS
      register: prep_result
      changed_when: "'OK' in prep_result.stdout"

    - name: Show MIGRATE-PREP result
      debug:
        var: prep_result.stdout

    - name: "RDMA RESHARD: register MRs on source for {{ reshard_slots_per_source }} slots"
      shell: |
        {{ redis_bin_dir }}/redis-cli -p {{ master_port }} \
          RDMA RESHARD {{ reshard_target }} {{ master_port }} {{ reshard_slots_per_source }}
      register: reshard_result
      changed_when: "'OK' in reshard_result.stdout"

    - name: Show RDMA RESHARD result
      debug:
        var: reshard_result.stdout

    - name: "RDMA RESHARD-TRANSFER: encode + RDMA-WRITE + DONE-SLOTS for {{ reshard_slots_per_source }} slots"
      shell: |
        {{ redis_bin_dir }}/redis-cli -p {{ master_port }} \
          RDMA RESHARD-TRANSFER {{ reshard_target }} {{ master_port }} {{ reshard_slots_per_source }}
      register: reshard_transfer_result
      changed_when: "'OK' in reshard_transfer_result.stdout"

    - name: Show RDMA RESHARD-TRANSFER result
      debug:
        var: reshard_transfer_result.stdout

    - name: "Post-reshard: dump VmPin on source (pinned MR pages)"
      shell: |
        PID=$(pgrep -f 'redis-server.*:{{ master_port }}' | head -1)
        if [ -n "$PID" ]; then grep -E 'VmPin|VmRSS' /proc/$PID/status; else echo "pid not found"; fi
      register: vmpin
      changed_when: false

    - name: Show pinned memory after RDMA RESHARD
      debug:
        var: vmpin.stdout_lines
