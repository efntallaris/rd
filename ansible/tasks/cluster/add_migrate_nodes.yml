---
- name: "Start and add migration nodes to cluster"
  hosts: redis_migrate
  become: yes
  tasks:
    - name: Set ulimit for open files
      shell: ulimit -n 65535

    - name: Remove old node config
      file:
        path: "{{ node_conf }}"
        state: absent

    - name: Create Redis log directory
      file:
        path: "{{ redis_log_dir }}"
        state: directory
        mode: "0755"

    - name: Create Redis data directory
      file:
        path: "{{ redis_data_dir }}"
        state: directory
        mode: "0755"

    - name: Generate cluster config
      template:
        src: ../../templates/redis_cluster.conf.j2
        dest: "{{ node_conf }}"
        mode: "0644"

    - name: Start redis-server
      command: "{{ redis_bin_dir }}/redis-server {{ node_conf }}"

    - name: Wait for Redis to be ready
      wait_for:
        port: "{{ master_port }}"
        timeout: 30

    # Redis <7.0 (the vanilla_redis branch is 6.2.16) rejects hostnames in
    # CLUSTER MEET / cluster add-node — only IP literals are accepted.
    # Resolve at runtime so the same task works against both 6.2 and 8.x.
    - name: Resolve migrate-node IP (self)
      shell: "getent hosts {{ inventory_hostname }} | awk '{print $1}'"
      register: migrate_self_ip
      changed_when: false

    - name: Resolve master_host IP
      shell: "getent hosts {{ master_host }} | awk '{print $1}'"
      register: master_host_ip
      changed_when: false

    - name: Add node to cluster
      command: >
        {{ redis_bin_dir }}/redis-cli -p {{ master_port }}
        --cluster add-node {{ migrate_self_ip.stdout }}:{{ master_port }}
        {{ master_host_ip.stdout }}:{{ master_port }}
