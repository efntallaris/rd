---
# Bring up the migration target as a 3-node INDEPENDENT vanilla cluster:
#   redis3 (master)   ← rdma-chain-followers points here at redis4 + ycsb1
#   redis4 (replica of redis3, vanilla PSYNC)
#   ycsb1  (replica of redis3, vanilla PSYNC)
#
# It is NOT joined to the redisraft donor cluster — redisraft's cluster
# gossip doesn't compose with vanilla CLUSTER MEET. The donor dials redis3
# directly by host:port for the RDMA migration control plane; recipient
# identification flows via CLUSTER MYID over the TCP control channel.
#
# Chain replication: the migration writes via kvstoreDictAddRaw bypass
# standard Redis PSYNC, so chain code on redis3 forwards the migrated
# bytes to redis4 + ycsb1 separately. (PSYNC carries everything else
# — RDB snapshot + the AOF stream of normal Redis commands.)
- name: "Start redis-server on migration master + replicas"
  hosts: redis_migrate:redis_migrate_replicas
  become: yes
  tasks:
    - name: Set ulimit for open files
      shell: ulimit -n 65535

    - name: Remove old node config
      file:
        path: "{{ node_conf }}"
        state: absent

    - name: Create Redis log + data directories
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ redis_log_dir }}"
        - "{{ redis_data_dir }}"

    - name: Compute rdma_chain_followers for this host
      set_fact:
        # On the migration master (redis3) the chain followers are the two
        # replicas. On a replica the chain config is empty — replicas don't
        # initiate chain establishment; they receive CHAIN-PREP/WIRE/FORWARDED.
        rdma_chain_followers: >-
          {% if inventory_hostname in groups['redis_migrate'] -%}
          {{ groups['redis_migrate_replicas'] | map('regex_replace', '^(.+)$', '\1:' + master_port|string) | join(' ') }}
          {%- else -%}
          {%- endif %}

    - name: Generate cluster config (with chain config for master)
      template:
        src: ../../templates/redis_cluster.conf.j2
        dest: "{{ node_conf }}"
        mode: "0644"

    - name: Start redis-server
      command: "{{ redis_bin_dir }}/redis-server {{ node_conf }}"

    - name: Wait for Redis to be ready
      wait_for:
        port: "{{ master_port }}"
        timeout: 30

# Form a 3-node vanilla cluster with redis3 as the master and redis4 +
# ycsb1 as replicas. redis3 claims ALL slots (0-16383) so it can accept
# writes from the donor for any slot the migration moves in.
- name: "Form the migration recipient cluster (redis3 master, redis4+ycsb1 replicas)"
  hosts: redis_migrate
  become: yes
  tasks:
    - name: Resolve self IP
      shell: "getent hosts {{ inventory_hostname }} | awk '{print $1}'"
      register: master_ip
      changed_when: false

    - name: Resolve replica IPs
      shell: "getent hosts {{ item }} | awk '{print $1}'"
      register: replica_ip_lookup
      changed_when: false
      loop: "{{ groups['redis_migrate_replicas'] }}"

    - name: Build replica host -> IP map
      set_fact:
        replica_ip_map: >-
          {{
            dict(
              replica_ip_lookup.results
                | map(attribute='item')
                | zip(replica_ip_lookup.results | map(attribute='stdout'))
            )
          }}

    - name: Reset any prior cluster state on redis3
      shell: |
        {{ redis_bin_dir }}/redis-cli -p {{ master_port }} CLUSTER RESET HARD || true
        {{ redis_bin_dir }}/redis-cli -p {{ master_port }} FLUSHALL || true

    - name: Give redis3 all 16384 slots so the donor can flip any slot in
      command: "{{ redis_bin_dir }}/redis-cli -p {{ master_port }} CLUSTER ADDSLOTSRANGE 0 16383"

    - name: Get redis3's cluster node ID (for replicas to REPLICATE)
      command: "{{ redis_bin_dir }}/redis-cli -p {{ master_port }} CLUSTER MYID"
      register: master_node_id
      changed_when: false

    - name: Stash master id + ip as host facts so replica play can read them
      set_fact:
        migrate_master_node_id: "{{ master_node_id.stdout }}"
        migrate_master_node_ip: "{{ master_ip.stdout }}"

- name: "Attach redis4 + ycsb1 as PSYNC replicas of redis3"
  hosts: redis_migrate_replicas
  become: yes
  tasks:
    - name: Resolve self IP
      shell: "getent hosts {{ inventory_hostname }} | awk '{print $1}'"
      register: replica_self_ip
      changed_when: false

    - name: Reset any prior cluster state on this replica
      shell: |
        {{ redis_bin_dir }}/redis-cli -p {{ master_port }} CLUSTER RESET HARD || true
        {{ redis_bin_dir }}/redis-cli -p {{ master_port }} FLUSHALL || true

    - name: CLUSTER MEET the migration master so we share the cluster topology
      command: "{{ redis_bin_dir }}/redis-cli -p {{ master_port }} CLUSTER MEET {{ hostvars[groups['redis_migrate'][0]]['migrate_master_node_ip'] }} {{ master_port }}"

    - name: Wait for cluster gossip to converge
      pause:
        seconds: 3

    - name: CLUSTER REPLICATE the migration master (become its PSYNC replica)
      command: "{{ redis_bin_dir }}/redis-cli -p {{ master_port }} CLUSTER REPLICATE {{ hostvars[groups['redis_migrate'][0]]['migrate_master_node_id'] }}"
