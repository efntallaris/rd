---
# RDMA-based reshard step v2 — autonomous-thread migration variant.
# Used by experiments/custom_reshard_v2/.
#
# Per source master:
#   1. CONFIG SET rdma-migration-port <per-source-port>     (avoid recipient port collision)
#   2. RDMA MIGRATE  <recipient> <port> <n-slots>           (kicks off a detached
#                                                            worker thread that
#                                                            walks PREP →
#                                                            REGISTER → TRANSFER
#                                                            → BACKPATCH → FLIP
#                                                            off the event loop;
#                                                            returns +OK
#                                                            migration_id=<N>
#                                                            immediately)
#   3. Poll RDMA MIGRATE-STATUS <id> until state ∈ {DONE,FAILED}.
#
# The dispatch of step 2 happens in parallel across all source masters via
# `async:+poll:0`. The wait loop in step 3 polls each source independently.
# Previously this playbook fired four blocking commands serially per host
# (MIGRATE-PREP → RESHARD → RESHARD-FLIP → RESHARD-TRANSFER); the registration
# step stalled the source's event loop for ~1.4s per source (1365 × ibv_reg_mr).
# The new flow runs registration off the event loop so YCSB throughput stays
# flat across the migration window.
- name: "RDMA reshard v2: autonomous-thread migration on each master"
  hosts: redis_masters
  become: yes
  # Sequential: one source completes its full PREP/REGISTER/TRANSFER/BACKPATCH/FLIP
  # cycle before the next source starts. Isolates per-migration behavior so
  # the YCSB dip measurement is one-source-at-a-time rather than all three
  # concurrent.
  serial: 1
  vars:
    reshard_target: "{{ groups['redis_migrate'][0] }}"
    reshard_slots_per_source: "{{ (reshard_slots | int) // (groups['redis_masters'] | length) }}"
    rdma_port_base: 17777
  tasks:
    - name: Compute this source's unique RDMA port
      set_fact:
        src_rdma_port: "{{ (rdma_port_base | int) + (groups['redis_masters'].index(inventory_hostname) | int) }}"

    - name: "CONFIG SET rdma-migration-port to per-source value"
      shell: |
        {{ redis_bin_dir }}/redis-cli -p {{ master_port }} \
          CONFIG SET rdma-migration-port {{ src_rdma_port }}
      register: cfg_set
      changed_when: false

    - name: "Dispatch RDMA MIGRATE (autonomous thread, returns +OK immediately)"
      shell: |
        {{ redis_bin_dir }}/redis-cli -p {{ master_port }} \
          RDMA MIGRATE {{ reshard_target }} {{ master_port }} {{ reshard_slots_per_source }}
      register: migrate_result
      changed_when: "'OK' in migrate_result.stdout"

    - name: "Parse migration_id from dispatch reply"
      set_fact:
        migration_id: "{{ migrate_result.stdout
                          | regex_search('migration_id=([0-9]+)', '\\1')
                          | first }}"

    - name: "Poll RDMA MIGRATE-STATUS until DONE or FAILED"
      shell: |
        {{ redis_bin_dir }}/redis-cli -p {{ master_port }} \
          RDMA MIGRATE-STATUS {{ migration_id }}
      register: mig_status
      changed_when: false
      # Tight poll: 200 ms × 3000 = 10 min cap. Used to be 1 s × 600.
      retries: 3000
      delay: 0.2
      until: >
        mig_status.stdout is defined and
        (mig_status.stdout_lines | first | default('')) in ['DONE','FAILED']

    - name: "Fail loudly if migration ended in FAILED state"
      fail:
        msg: "[{{ inventory_hostname }}] RDMA MIGRATE id={{ migration_id }} FAILED: {{ mig_status.stdout_lines | last }}"
      when: (mig_status.stdout_lines | first | default('')) == 'FAILED'

    # Removed: log start debug, dispatch debug, status debug, VmPin dump,
    # pinned-memory debug, inter-migration dwell. They contributed ~5-7s
    # of pure ansible orchestration overhead between migrations.
