---
# RDMA-based reshard step v2 — early-ownership-flip variant.
# Used by experiments/custom_reshard_v2/.
#
# Sequence (per source master, in order):
#   1. CONFIG SET rdma-migration-port <per-source-port>     (avoid recipient port collision)
#   2. RDMA MIGRATE-PREP <recipient> <port> <slots...>      (bootstrap RDMA QP + recipient bufs)
#   3. RDMA RESHARD     <recipient> <port> <n-slots>        (register source MRs)
#   4. RDMA RESHARD-FLIP <recipient> <port> <n-slots>       ← NEW: lock + flip ownership
#   5. RDMA RESHARD-EXEC <recipient> <port> <n-slots>       (RDMA-WRITE + DONE-SLOTS apply)
#
# vs. reshard_cluster_rdma.yml (v1): ownership flip moves from a (deferred)
# post-EXEC SETSLOT broadcast to a pre-EXEC RDMA RESHARD-FLIP. After step 4,
# clients hitting the source for any of the migrated slots get -MOVED to the
# recipient; the recipient is the new owner and serves them.
#
# Known v0 limitations (see PHASE3_PLAN.md and the C-level comment on
# rdmaReshardFlipCommand): the recipient does NOT yet have the source's
# data when ownership flips. Between the FLIP and the EXEC-driven RDMA WRITE
# delivery, reads on the recipient for not-yet-migrated keys return NIL. The
# window is short (single-digit seconds typical) but real. Parallel-read
# fallback to source is the next iteration.
- name: "RDMA reshard v2: register + early-flip + transfer on each master"
  hosts: redis_masters
  become: yes
  vars:
    reshard_target: "{{ groups['redis_migrate'][0] }}"
    reshard_slots_per_source: "{{ (reshard_slots | int) // (groups['redis_masters'] | length) }}"
    rdma_port_base: 17777
  tasks:
    - name: Compute this source's unique RDMA port
      set_fact:
        src_rdma_port: "{{ (rdma_port_base | int) + (groups['redis_masters'].index(inventory_hostname) | int) }}"

    - name: Log RDMA reshard v2 start
      debug:
        msg: "[{{ inventory_hostname }}] RDMA RESHARD v2 -> {{ reshard_target }}:{{ master_port }} for {{ reshard_slots_per_source }} slots (own RDMA port {{ src_rdma_port }})"

    - name: "CONFIG SET rdma-migration-port to per-source value"
      shell: |
        {{ redis_bin_dir }}/redis-cli -p {{ master_port }} \
          CONFIG SET rdma-migration-port {{ src_rdma_port }}
      register: cfg_set
      changed_when: false

    - name: "Get this source's owned slot range"
      shell: |
        {{ redis_bin_dir }}/redis-cli -p {{ master_port }} CLUSTER NODES \
          | awk '$3 ~ /myself/ {print $9}'
      register: my_slot_range
      changed_when: false

    - name: "Bootstrap RDMA link + register {{ reshard_slots_per_source }} recipient buffers"
      shell: |
        START=$(echo '{{ my_slot_range.stdout }}' | cut -d- -f1)
        END=$((START + {{ reshard_slots_per_source }} - 1))
        SLOTS=$(seq $START $END | tr '\n' ' ')
        {{ redis_bin_dir }}/redis-cli -p {{ master_port }} \
          RDMA MIGRATE-PREP {{ reshard_target }} {{ master_port }} $SLOTS
      register: prep_result
      changed_when: "'OK' in prep_result.stdout"

    - name: Show MIGRATE-PREP result
      debug:
        var: prep_result.stdout

    - name: "RDMA RESHARD: register MRs on source for {{ reshard_slots_per_source }} slots"
      shell: |
        {{ redis_bin_dir }}/redis-cli -p {{ master_port }} \
          RDMA RESHARD {{ reshard_target }} {{ master_port }} {{ reshard_slots_per_source }}
      register: reshard_result
      changed_when: "'OK' in reshard_result.stdout"

    - name: Show RDMA RESHARD result
      debug:
        var: reshard_result.stdout

    - name: "RDMA RESHARD-FLIP: lock source blocks + flip ownership to recipient"
      shell: |
        {{ redis_bin_dir }}/redis-cli -p {{ master_port }} \
          RDMA RESHARD-FLIP {{ reshard_target }} {{ master_port }} {{ reshard_slots_per_source }}
      register: reshard_flip_result
      changed_when: "'OK' in reshard_flip_result.stdout"

    - name: Show RDMA RESHARD-FLIP result
      debug:
        var: reshard_flip_result.stdout

    - name: "RDMA RESHARD-EXEC: encode + RDMA-WRITE + DONE-SLOTS for {{ reshard_slots_per_source }} slots"
      shell: |
        {{ redis_bin_dir }}/redis-cli -p {{ master_port }} \
          RDMA RESHARD-EXEC {{ reshard_target }} {{ master_port }} {{ reshard_slots_per_source }}
      register: reshard_exec_result
      changed_when: "'OK' in reshard_exec_result.stdout"

    - name: Show RDMA RESHARD-EXEC result
      debug:
        var: reshard_exec_result.stdout

    - name: "Post-reshard: dump VmPin on source"
      shell: |
        PID=$(pgrep -f 'redis-server.*:{{ master_port }}' | head -1)
        if [ -n "$PID" ]; then grep -E 'VmPin|VmRSS' /proc/$PID/status; else echo "pid not found"; fi
      register: vmpin
      changed_when: false

    - name: Show pinned memory after RDMA RESHARD-EXEC
      debug:
        var: vmpin.stdout_lines
