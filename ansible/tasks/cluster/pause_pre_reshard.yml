---
# Insert before the reshard playbook to give YCSB N seconds of steady-state
# pre-migration baseline. Without this, the reshard playbook fires almost
# immediately after start_ycsb_async, so the migration band sits at the
# very start of the YCSB run with no "before" sample.
#
# Default 18 seconds, which places the first migration at YCSB second ~20
# (YCSB needs ~8s for its 200 worker threads to finish init() and start
# producing ops, then this pause is wall-clock time from there until the
# reshard playbook fires; ansible setup adds ~2s overhead).
#
# Configurable via -e pre_reshard_pause=N.
- name: "Pre-reshard steady-state pause"
  hosts: redis_masters[0]
  gather_facts: no
  tasks:
    - name: "Pause {{ pre_reshard_pause | default(18) }} seconds so YCSB has a pre-migration baseline"
      pause:
        seconds: "{{ pre_reshard_pause | default(18) }}"
