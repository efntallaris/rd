---
- name: "Build Redis RDMA on all CloudLab nodes"
  hosts: all
  become: yes

  vars:
    base_dir: /root/rd

  handlers:
    - name: run ldconfig
      command: ldconfig

  tasks:
    # ── 1. System packages ──────────────────────────────────────────────
    - name: Install required packages
      apt:
        name:
          - autoconf
          - automake
          - build-essential
          - cmake
          - cython3
          - gcc
          - git
          - ifstat
          - libatomic-ops-dev
          - libibumad-dev
          - libibverbs-dev
          - libnl-3-dev
          - libnl-route-3-dev
          - libpci-dev
          - librdmacm-dev
          - libtool
          - libudev-dev
          - libuv1-dev
          - maven
          - ninja-build
          - pandoc
          - pkg-config
          - python3-dev
          - python3-docutils
          - sysstat
          - tcl
          - valgrind
        state: present
        update_cache: yes

    # ── 2. Clone or update project repo ─────────────────────────────────
    - name: Remove old rd repository (clean re-clone)
      file:
        path: "{{ base_dir }}"
        state: absent
      when: ansible_connection != "local"

    - name: Clone rd repository
      git:
        repo: "{{ rd_repo }}"
        dest: "{{ base_dir }}"
        version: "{{ rd_branch }}"
      when: ansible_connection != "local"

    # ── 3. Build rdma-core from source ──────────────────────────────────
    - name: Create rdma-core build directory
      file:
        path: "{{ rdma_core_dir }}/build"
        state: directory
        mode: "0755"

    - name: Configure rdma-core with cmake
      command: cmake ..
      args:
        chdir: "{{ rdma_core_dir }}/build"
        creates: "{{ rdma_core_dir }}/build/Makefile"

    - name: Build rdma-core
      make:
        chdir: "{{ rdma_core_dir }}/build"
        params:
          NUM_THREADS: "{{ ansible_processor_vcpus }}"
          --jobs: "{{ ansible_processor_vcpus }}"

    - name: Install rdma-core
      make:
        chdir: "{{ rdma_core_dir }}/build"
        target: install
      notify: run ldconfig

    # ── 4. Load InfiniBand kernel modules ───────────────────────────────
    - name: Load RDMA and InfiniBand kernel modules
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - rdma_cm
        - ib_uverbs
        - rdma_ucm
        - ib_umad
        - ib_ipoib
        - mlx4_ib
        - mlx4_en

    # ── 5. Build jemalloc ───────────────────────────────────────────────
    - name: Run jemalloc autogen.sh
      command: /bin/sh autogen.sh
      args:
        chdir: "{{ redis_dir }}/deps/jemalloc"
        creates: "{{ redis_dir }}/deps/jemalloc/config.status"

    - name: Configure jemalloc
      command: /bin/sh configure
      args:
        chdir: "{{ redis_dir }}/deps/jemalloc"
        creates: "{{ redis_dir }}/deps/jemalloc/config.status"

    # ── 6. Build all dependencies ───────────────────────────────────────
    - name: "Build dependency: {{ item }}"
      make:
        chdir: "{{ redis_dir }}/deps"
        target: "{{ item }}"
        params:
          --jobs: "{{ ansible_processor_vcpus }}"
      loop:
        - jemalloc
        - hiredis
        - hdr_histogram
        - linenoise

    # ── 7. Build Redis ──────────────────────────────────────────────────
    - name: Ensure mkreleasehdr.sh is executable
      file:
        path: "{{ redis_dir }}/src/mkreleasehdr.sh"
        mode: "0755"

    - name: Build Redis
      make:
        chdir: "{{ redis_dir }}"

    # ── 8. Install Redis binaries ───────────────────────────────────────
    - name: Install Redis binaries
      make:
        chdir: "{{ redis_dir }}"
        target: install
        params:
          PREFIX: "{{ local_setup_dir }}"
