---
# ─── Directories ────────────────────────────────────────────────────────────
main_dir: /users/entall/rd
redis_dir: /users/entall/rd/redis
redis_src_dir: /users/entall/rd/redis/src
local_setup_dir: /users/entall/rd/redis_bin
redis_bin_dir: "{{ local_setup_dir }}/bin"
ycsb_repo: "https://github.com/efntallaris/rd.git"
ycsb_branch: aqueduct  # upstream YCSB now lives at /ycsb_client on aqueduct
ycsb_checkout_dir: /users/entall/ycsb_src
ycsb_src_dir: "{{ ycsb_checkout_dir }}/ycsb_client"
ycsb_dir: /users/entall/ycsb_client
ycsb_dir_bin: "{{ ycsb_dir }}/bin"
redis_workload_path: "{{ main_dir }}/workloads/"
redis_log_dir: /tmp/redis_logs
redis_data_dir: /tmp/redis_data
local_log_dir: /users/entall/systat_logs
ycsb_log_filename: /tmp/ycsb_output
experimental_output_dir: /tmp/experiments

# ─── Repo ───────────────────────────────────────────────────────────────────
rd_repo: "https://github.com/efntallaris/rd.git"
rd_branch: aqueduct
rdma_core_dir: /users/entall/rd/rdma-core

# ─── Cluster settings ──────────────────────────────────────────────────────
master_port: "8000"
master_host: redis0
node_conf: "/users/entall/{{ inventory_hostname }}.conf"

# ─── YCSB settings ─────────────────────────────────────────────────────────
ycsb_loader_instance: ycsb0
ycsb_threads_load: 50
ycsb_threads_run: 50
ycsb_timeout: 10000

# ─── Experiment ─────────────────────────────────────────────────────────────
experiment_name: default_experiment
redis_workload: workloadfulva5050
reshard_slots: 4095
reshard_timeout: 1200

# ─── Monitoring suffixes ────────────────────────────────────────────────────
if_stat: "_ifstat.txt"
mp_stat: "_mpstat.txt"
io_stat: "_iostat.txt"

# ─── RedisRaft (vanilla_raft_baseline / custom_raft_baseline) ──────────────
# The module artifact lives at the project root after `cmake --build`
# (CMakeLists places redisraft.so there, not in build/).
redisraft_src: /users/entall/rd/redisraft
redisraft_module: /users/entall/rd/redisraft/redisraft.so
raft_log_dir: /tmp/redis_data   # reuse redis_data_dir so clean_runtime wipes it

# 3 ShardGroups x 3 Raft nodes each, 3 procs per physical host.
# Leaders deliberately spread across redis0/redis1/redis2 (write-CPU balance).
# raft_id is the per-shard --raft.id passed at boot; the first node listed
# under each shardgroup runs RAFT.CLUSTER INIT (becomes initial leader) and
# the others run RAFT.CLUSTER JOIN pointing at it.
redisraft_shardgroups:
  - id: sg1
    port: 8000
    slot_config: "0:5460"
    nodes:
      - host: redis0
        raft_id: 1
      - host: redis1
        raft_id: 2
      - host: redis2
        raft_id: 3
  - id: sg2
    port: 8001
    slot_config: "5461:10921"
    nodes:
      - host: redis1
        raft_id: 1
      - host: redis2
        raft_id: 2
      - host: redis0
        raft_id: 3
  - id: sg3
    port: 8002
    slot_config: "10922:16383"
    nodes:
      - host: redis2
        raft_id: 1
      - host: redis0
        raft_id: 2
      - host: redis1
        raft_id: 3
  # sg4: migration recipient cluster — a SEPARATE redisraft cluster from
  # sg1/2/3 (no RAFT.SHARDGROUP LINK between them). Owns the full slot
  # space (0:16383) so migrations from any donor shardgroup can target it
  # without slot-range conflicts. The 3 nodes form sg4's raft replica set;
  # redis3 is initial leader, redis4 + ycsb1 are followers that consume
  # chain-delivered RDMA buffers via wrapped body-less AppendEntries.
  - id: sg4
    port: 8000
    slot_config: "0:16383"
    nodes:
      - host: redis3
        raft_id: 1
      - host: redis4
        raft_id: 2
      - host: ycsb1
        raft_id: 3
