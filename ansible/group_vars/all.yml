---
# ─── Directories ────────────────────────────────────────────────────────────
main_dir: /users/entall/rd
redis_dir: /users/entall/rd/redis
redis_src_dir: /users/entall/rd/redis/src
local_setup_dir: /users/entall/rd/redis_bin
redis_bin_dir: "{{ local_setup_dir }}/bin"
ycsb_src_dir: /users/entall/rd/ycsb_client
ycsb_dir: /users/entall/ycsb_client
ycsb_dir_bin: "{{ ycsb_dir }}/bin"
redis_workload_path: "{{ main_dir }}/workloads/"
redis_log_dir: /tmp/redis_logs
local_log_dir: /users/entall/systat_logs
ycsb_log_filename: /tmp/ycsb_output
experimental_output_dir: /tmp/experiments

# ─── Repo ───────────────────────────────────────────────────────────────────
rd_repo: "https://github.com/efntallaris/rd.git"
rd_branch: aqueduct
rdma_core_dir: /users/entall/rd/rdma-core

# ─── Cluster settings ──────────────────────────────────────────────────────
master_port: "8000"
master_host: redis0
node_conf: "/users/entall/{{ inventory_hostname }}.conf"

# ─── YCSB settings ─────────────────────────────────────────────────────────
ycsb_loader_instance: ycsb0
ycsb_threads_load: 100
ycsb_threads_run: 200
ycsb_timeout: 10000

# ─── Experiment ─────────────────────────────────────────────────────────────
experiment_name: default_experiment
redis_workload: workloadfulva5050
reshard_slots: 4095
reshard_timeout: 1200

# ─── Monitoring suffixes ────────────────────────────────────────────────────
if_stat: "_ifstat.txt"
mp_stat: "_mpstat.txt"
io_stat: "_iostat.txt"
