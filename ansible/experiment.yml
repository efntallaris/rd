---
# ── Full experiment orchestrator ────────────────────────────────────────────
# Usage:
#   ansible-playbook -i inventory.ini experiment.yml
#
# Override experiment settings:
#   ansible-playbook -i inventory.ini experiment.yml \
#     -e experiment_name=my_test \
#     -e redis_workload=workloadreadheavy
# ────────────────────────────────────────────────────────────────────────────

# 1. Teardown any previous run
- import_playbook: tasks/kill_all.yml
- import_playbook: tasks/clean_cluster.yml

# 2. Start Redis cluster
- import_playbook: tasks/start_redis_instances.yml
- import_playbook: tasks/create_cluster.yml

# 3. Build and load YCSB data
- import_playbook: tasks/build_ycsb.yml
- import_playbook: tasks/load_ycsb.yml

# 4. Add migration nodes to cluster
- import_playbook: tasks/add_migrate_nodes.yml

# 5. Start monitoring and run experiment
- import_playbook: tasks/start_monitoring.yml
- import_playbook: tasks/run_ycsb.yml
- import_playbook: tasks/reshard_cluster.yml

# 6. Collect results and clean up
- import_playbook: tasks/collect_results.yml
- import_playbook: tasks/kill_all.yml
